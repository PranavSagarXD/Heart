<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Stream | StreamXOne</title>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #0a0a0a;
            --text: #ededed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff 30%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .error-code::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            -webkit-text-fill-color: white;
            filter: blur(20px);
            opacity: 0.3;
            z-index: -1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            color: #a1a1a1;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .redirect-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 2rem;
        }

        .countdown {
            color: var(--accent);
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: var(--primary);
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--primary);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        /* Ambient Background */
        .ambient-light {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Grid Background Pattern */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="ambient-light"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Lost in the Stream</h1>
        <p>The content you're looking for has drifted away. Don't worry, we're bringing you back home.</p>
        
        <a href="/" class="btn">Return Home</a>

        <div class="redirect-text">
            Redirecting in <span id="timer" class="countdown">10</span> seconds...
        </div>
    </div>

    <script>
        let seconds = 10;
        const timerEl = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>
</html>
